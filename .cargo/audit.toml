# cargo-audit 0.22+ configuration for joinmarket-rs
# Run: cargo audit
# Add to CI: cargo audit

[advisories]
# All entries below affect the `--features arti` build only.
# The default `tordaemon` build is unaffected.
# cargo-deny runs with default features and therefore does not see these
# advisories; cargo audit scans the full Cargo.lock and does, so we suppress
# them here only.
ignore = [
    # RUSTSEC-2023-0071 — Marvin Attack in `rsa` crate.
    # No fixed version available upstream.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2025-0141 — bincode 2.x is unmaintained.
    # Transitive arti dep (tor-netdir → typed-index-collections → bincode).
    # No fix available; does not affect any peer-supplied input path.
    "RUSTSEC-2025-0141",
    # RUSTSEC-2024-0436 — paste 1.x is unmaintained.
    # Transitive arti dep (proc-macro, compile-time only; no runtime surface).
    "RUSTSEC-2024-0436",
]
[output]
# Vulnerabilities (non-informational) are always hard errors regardless of
# this list. We do not add "yanked" here because unicode-segmentation 1.13.0
# is a yanked arti-only transitive dep that cannot be selectively suppressed
# via cargo-audit's config; it is monitored via `cargo deny check advisories`.
deny = []
quiet = false
